<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#ffffff"/>

  <!-- Main Brand Text - EUROFLEX with special O -->
  <g>
    <!-- E -->
    <text x="85" y="110" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
          fill="#333333" text-anchor="middle">E</text>

    <!-- U -->
    <text x="145" y="110" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
          fill="#333333" text-anchor="middle">U</text>

    <!-- R -->
    <text x="205" y="110" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
          fill="#333333" text-anchor="middle">R</text>

    <!-- O - Blue colored circle -->
    <circle cx="265" cy="60" r="35" fill="#0066CC" opacity="0.9"/>
    <text x="265" y="80" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
          fill="#ffffff" text-anchor="middle" dominant-baseline="middle">O</text>

    <!-- F -->
    <text x="315" y="110" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
          fill="#333333" text-anchor="middle">F</text>

    <!-- L -->
    <text x="360" y="110" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
          fill="#333333" text-anchor="middle">L</text>

    <!-- E -->
    <text x="405" y="110" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
          fill="#333333" text-anchor="middle">E</text>

    <!-- X -->
    <text x="455" y="110" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
          fill="#333333" text-anchor="middle">X</text>
  </g>

  <!-- Tagline -->
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="28" font-weight="600"
        fill="#0066CC" text-anchor="middle" letter-spacing="1">WE CREATE SOLUTIONS</text>

  <!-- Decorative line under tagline -->
  <line x1="100" y1="220" x2="300" y2="220" stroke="#0066CC" stroke-width="2"/>
</svg>
